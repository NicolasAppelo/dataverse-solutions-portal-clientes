<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dataverse Solutions — Portal de Proyectos</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--surf:#fff;--surf2:#f0efe9;--surf3:#e8e7e0;--bdr:#e2e0d8;--bdr2:#c8c5ba;--txt:#18170f;--txt2:#65635a;--txt3:#9b9890;--r:10px;--rl:14px}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh}
#login-screen{min-height:100vh;display:none;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.login-card{background:var(--surf);border:1px solid var(--bdr);border-radius:20px;padding:48px 40px;width:380px;max-width:100%;text-align:center}
.login-logo-wrap{margin-bottom:22px;height:60px;display:flex;align-items:center;justify-content:center}
.login-logo-wrap img{height:60px;object-fit:contain}
.login-card h1{font-family:'Syne',sans-serif;font-weight:800;font-size:21px;letter-spacing:-.02em;margin-bottom:5px}
.login-card p{font-size:13px;color:var(--txt2);margin-bottom:26px}
.login-card input[type=password]{width:100%;padding:12px 14px;border:1px solid var(--bdr2);border-radius:9px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--surf);color:var(--txt);outline:none;text-align:center;letter-spacing:.12em}
.login-card input:focus{border-color:#378ADD;box-shadow:0 0 0 3px rgba(55,138,221,.1)}
.login-btn{width:100%;margin-top:11px;padding:12px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;transition:opacity .15s}
.login-btn:hover{opacity:.87}
.login-err{font-size:12px;color:#A32D2D;margin-top:8px;min-height:18px}
.login-foot{font-size:11px;color:var(--txt3);margin-top:22px}
.hdr{background:var(--surf);border-bottom:1px solid var(--bdr);padding:14px 36px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-logo{display:flex;align-items:center;gap:11px}
.hdr-logo img{height:32px;object-fit:contain}
.hdr-brand strong{display:block;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;letter-spacing:-.01em}
.hdr-brand span{font-size:10px;color:var(--txt3);letter-spacing:.08em;text-transform:uppercase}
.hdr-right{display:flex;align-items:center;gap:10px}
.role-pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.role-pill.admin{background:#E6F1FB;color:#0C447C;border:1px solid rgba(55,138,221,.2)}
.role-pill.client{background:var(--surf2);color:var(--txt2);border:1px solid var(--bdr)}
.hdr-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;background:transparent;border:1px solid var(--bdr2);color:var(--txt2);font-family:'DM Sans',sans-serif;transition:all .15s}
.hdr-btn:hover{background:var(--surf2)}
.main{max-width:1080px;margin:0 auto;padding:32px 20px}
.tabs{display:flex;gap:9px;margin-bottom:28px;flex-wrap:wrap}
.tab{padding:9px 20px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--bdr);background:transparent;color:var(--txt2);font-family:'DM Sans',sans-serif;transition:all .18s}
.tab:hover:not(.on){background:var(--surf2)}
.tab.on{border-width:2px;font-weight:600}
.proj-hdr{margin-bottom:20px}
.proj-hdr h1{font-family:'Syne',sans-serif;font-weight:700;font-size:24px;letter-spacing:-.02em;margin-bottom:4px}
.proj-hdr p{font-size:13px;color:var(--txt2)}
.proj-meta{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;align-items:center}
.meta-chip{font-size:12px;padding:4px 12px;border-radius:20px;background:var(--surf2);border:1px solid var(--bdr);color:var(--txt2)}
.status-chip{font-size:12px;font-weight:600;padding:4px 14px;border-radius:20px;border:1px solid}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:24px}
.stat{background:var(--surf2);border-radius:9px;padding:13px 15px}
.stat-lbl{font-size:11px;color:var(--txt3);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:600}
.tl-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:24px;margin-bottom:20px}
.tl-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.tl-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--txt3)}
.tl-legend{display:flex;gap:14px;flex-wrap:wrap}
.tl-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt2)}
.tl-legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tl-bar-wrap{position:relative;margin-bottom:8px}
.tl-bar-bg{height:6px;background:var(--surf3);border-radius:3px;position:relative}
.tl-bar-prog{height:100%;border-radius:3px;transition:width .5s}
.tl-today-line{position:absolute;top:-7px;width:2px;border-radius:1px;height:20px;transform:translateX(-50%)}
.tl-today-lbl{position:absolute;top:-22px;transform:translateX(-50%);font-size:10px;font-weight:600;color:var(--txt);white-space:nowrap;background:var(--surf);padding:1px 5px;border-radius:3px;border:1px solid var(--bdr)}
.tl-dates{display:flex;justify-content:space-between;margin-top:6px}
.tl-date-lbl{font-size:11px;color:var(--txt3)}
.tl-dots-row{position:relative;height:60px;margin-top:10px}
.tl-dot-wrap{position:absolute;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;cursor:default}
.tl-dot{width:13px;height:13px;border-radius:50%;border:2.5px solid var(--surf);flex-shrink:0;transition:transform .15s;z-index:2}
.tl-dot-wrap:hover .tl-dot{transform:scale(1.35)}
.tl-dot-line{width:1.5px;height:12px;background:var(--bdr)}
.tl-dot-lbl{font-size:9px;max-width:72px;text-align:center;color:var(--txt2);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ms-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:18px;margin-bottom:20px}
@media(max-width:640px){.ms-grid{grid-template-columns:1fr}}
.ms-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:20px}
.ms-card-hdr{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.ms-dot-sm{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ms-item{display:flex;gap:9px;align-items:flex-start;padding:9px 10px;border-radius:8px;margin-bottom:6px}
.ms-item.done-row{background:rgba(29,158,117,.06)}
.ms-item.late-row{background:rgba(163,45,45,.06)}
.ms-item.pend-row{background:var(--surf2)}
.ms-icon{width:18px;height:18px;border-radius:50%;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
.ms-icon svg{width:9px;height:9px}
.ms-body{flex:1;min-width:0}
.ms-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ms-item.pend-row .ms-name,.ms-item.late-row .ms-name{font-weight:400;color:var(--txt2)}
.ms-sub{font-size:11px;color:var(--txt3);margin-top:2px}
.ms-resp{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;margin-top:2px;align-self:center}
.mod-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:20px;margin-bottom:20px}
.mod-card-hdr{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--txt3);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.ring-row{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.mod-row{margin-bottom:12px}
.mod-lbl{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.bar-bg{height:4px;background:var(--surf3);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.adm-panel{background:var(--surf);border:1.5px solid var(--bdr2);border-radius:var(--rl);padding:22px;margin-bottom:22px}
.adm-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.adm-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.adm-title .badge{font-size:10px;font-weight:600;background:#E6F1FB;color:#0C447C;padding:2px 9px;border-radius:10px}
.adm-new-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;border:none;color:#fff;transition:opacity .15s}
.adm-new-btn:hover{opacity:.87}
.adm-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.adm-tab{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--bdr);background:transparent;color:var(--txt2);font-family:'DM Sans',sans-serif;transition:all .15s}
.adm-tab.on{border-width:2px;font-weight:600}
.adm-tab:hover:not(.on){background:var(--surf2)}
.adm-ms-card,.adm-mod-card{background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;padding:13px;margin-bottom:8px}
.adm-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.adm-row input[type=text]{flex:1;min-width:120px}
.adm-row input[type=date]{width:138px}
.adm-row select{padding:8px 10px;border:1px solid var(--bdr2);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--surf);color:var(--txt);outline:none;cursor:pointer}
.adm-bottom{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.adm-bottom input[type=text]{flex:1;min-width:80px}
.chk-lbl{display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;white-space:nowrap;color:var(--txt2)}
.pct-val{font-size:13px;font-weight:600;min-width:34px;text-align:right}
.add-section{border-top:1px solid var(--bdr);padding-top:14px;margin-top:6px}
.add-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--txt3);margin-bottom:10px}
input[type=password],input[type=text],input[type=date],input[type=number]{padding:8px 11px;border:1px solid var(--bdr2);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--surf);color:var(--txt);outline:none}
input:focus{border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,.1)}
input[type=range]{width:100%;height:4px;border-radius:2px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.12);cursor:pointer}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid var(--bdr2);background:transparent;color:var(--txt2);transition:all .15s}
.btn:hover{background:var(--surf2)}
.btn-danger{padding:5px 11px;font-size:12px;border-radius:7px;cursor:pointer;border:1px solid #e8a0a0;background:#FCEBEB;color:#A32D2D;font-family:'DM Sans',sans-serif}
.btn-add{padding:8px 16px;font-size:13px;border-radius:8px;cursor:pointer;border:1px solid var(--bdr2);background:transparent;color:var(--txt2);font-family:'DM Sans',sans-serif;margin-top:4px}
.btn-add:hover{background:var(--surf2)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal-box{background:var(--surf);border:1px solid var(--bdr);border-radius:18px;padding:30px;width:480px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal-box h3{font-family:'Syne',sans-serif;font-weight:700;font-size:19px;margin-bottom:5px}
.modal-box .modal-sub{font-size:13px;color:var(--txt2);margin-bottom:22px}
.form-field{margin-bottom:14px}
.form-field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--txt3);margin-bottom:6px}
.form-field input,.form-field select{width:100%}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.modal-err{font-size:12px;color:#A32D2D;margin-bottom:8px;display:none}
#np-mods-list .np-mod-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surf2);border-radius:7px;margin-bottom:6px;font-size:13px}
#np-mods-list .np-mod-row span{flex:1}
#np-mods-list .np-mod-row button{border:none;background:none;cursor:pointer;color:#A32D2D;font-size:16px;padding:0 3px;line-height:1}
#save-ind{position:fixed;bottom:18px;right:18px;font-size:12px;padding:8px 15px;border-radius:8px;z-index:999;font-family:'DM Sans',sans-serif;transition:opacity .4s;pointer-events:none;opacity:0;color:#fff}
footer{text-align:center;font-size:11px;color:var(--txt3);padding:20px;margin-top:4px}
@media print{.hdr-right,.adm-panel,.modal-bg{display:none!important}}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo-wrap"><img id="login-logo" src="" alt="DVS"/></div>
    <h1>Dataverse Solutions</h1>
    <p>Ingresa tu contraseña para acceder al portal.</p>
    <input type="password" id="login-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Ingresar</button>
    <div class="login-err" id="login-err"></div>
    <div class="login-foot">dvs.ai · Project Portal</div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="hdr">
    <div class="hdr-logo">
      <img id="hdr-logo" src="" alt="DVS"/>
      <div class="hdr-brand">
        <strong>Dataverse Solutions</strong>
        <span id="hdr-sub">Portal</span>
      </div>
    </div>
    <div class="hdr-right">
      <div class="role-pill" id="role-pill"></div>
      <button class="hdr-btn" onclick="logout()">Salir</button>
    </div>
  </div>
  <div class="main">
    <div class="tabs" id="tabs-row" style="display:none"></div>
    <div id="proj-view"></div>
    <div id="adm-panel" style="display:none"></div>
  </div>
  <footer>Dataverse Solutions SL &nbsp;·&nbsp; dvs.ai &nbsp;·&nbsp; <span id="upd-date"></span></footer>
</div>

<div class="modal-bg" id="modal-np">
  <div class="modal-box">
    <h3>Nuevo proyecto</h3>
    <p class="modal-sub">Completa la información. Podrás agregar actividades desde el panel de administración.</p>
    <div class="form-grid">
      <div class="form-field"><label>Nombre del cliente</label><input type="text" id="np-name" placeholder="Ej: ACME S.A.S."/></div>
      <div class="form-field"><label>Color</label>
        <select id="np-color"><option value="teal">Teal</option><option value="pink">Pink</option><option value="blue">Blue</option><option value="purple">Purple</option><option value="amber">Amber</option></select>
      </div>
    </div>
    <div class="form-field"><label>Descripción</label><input type="text" id="np-desc" placeholder="Ej: Automatización de procesos con IA"/></div>
    <div class="form-field"><label>Contraseña del cliente</label><input type="text" id="np-pw" placeholder="Ej: cliente2025"/></div>
    <div class="form-grid">
      <div class="form-field"><label>Fecha inicio (contrato)</label><input type="date" id="np-start"/></div>
      <div class="form-field"><label>Fecha entrega</label><input type="date" id="np-end"/></div>
    </div>
    <div style="margin-bottom:14px">
      <div class="add-lbl">Módulos iniciales</div>
      <div id="np-mods-list"></div>
      <div style="display:flex;gap:8px;margin-top:6px">
        <input type="text" id="np-mod-inp" placeholder="Nombre del módulo" style="flex:1" onkeydown="if(event.key==='Enter')npAddMod()"/>
        <button class="btn" onclick="npAddMod()">+ Agregar</button>
      </div>
    </div>
    <div class="modal-err" id="np-err"></div>
    <div class="modal-actions">
      <button onclick="saveNewProject()" style="flex:1;padding:11px;border-radius:9px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:#fff;transition:opacity .15s" id="np-save-btn">Crear proyecto</button>
      <button class="btn" onclick="closeNp()">Cancelar</button>
    </div>
  </div>
</div>

<div id="save-ind"></div>

<script>
const CONFIG={adminPassword:"dvs2025",projects:[]};
const PAL={
  teal:{main:"#1D9E75",sub:"rgba(29,158,117,.09)",txt:"#085041",light:"#E1F5EE"},
  pink:{main:"#D4537E",sub:"rgba(212,83,126,.09)",txt:"#72243E",light:"#FBEAF0"},
  blue:{main:"#378ADD",sub:"rgba(55,138,221,.09)",txt:"#0C447C",light:"#E6F1FB"},
  purple:{main:"#7F77DD",sub:"rgba(127,119,221,.09)",txt:"#3C3489",light:"#EEEDFE"},
  amber:{main:"#BA7517",sub:"rgba(186,117,23,.09)",txt:"#412402",light:"#FAEEDA"}
};
const CLIENT_CLR={main:"#BA7517",light:"#FAEEDA",txt:"#412402"};

const REPO_OWNER="NicolasAppelo",REPO_NAME="dataverse-solutions-portal-clientes",DATA_FILE="data.json";
const API_URL=`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}`;
const ADMIN_GH_TOKEN=["N7EZ4TQEZ3HSJ4MFJplbKv4QJVeqdQB","85yhgMnGQokl93sxCBFx2lm67aV6_8K","ZDtTpoZ4G70A7RN5TB11_tap_buhtig"].join("").split("").reverse().join("");
let _ghToken=null,_fileSha=null,_saveTimer=null;

function showSave(msg,ok){
  const el=document.getElementById("save-ind");
  el.style.background=ok===false?"#A32D2D":ok===true?"#085041":"#1a1917";
  el.style.opacity="1";el.textContent=msg;
  if(ok!==undefined)setTimeout(()=>{el.style.opacity="0";},2500);
}
const RAW_URL=`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${DATA_FILE}`;

async function loadFromGitHub(){
  try{
    showSave("Cargando…");
    /* Step 1: read content via raw URL — no auth, no preflight, no CORS issues */
    const res=await fetch(RAW_URL+"?t="+Date.now());
    if(!res.ok)throw new Error("HTTP "+res.status);
    const dec=await res.json();
    if(!dec?.projects?.length)return false;
    data=dec.projects;
    data.forEach(p=>{
      const i=CONFIG.projects.findIndex(x=>x.id===p.id);
      if(i>=0)CONFIG.projects[i].clientPassword=p.clientPassword;
      else CONFIG.projects.push({id:p.id,name:p.name,clientPassword:p.clientPassword||""});
    });
    /* SHA fetched lazily on first write */
    showSave("✓ Listo",true);return true;
  }catch(e){console.error("load error:",e);showSave("✗ Error cargando: "+e.message,false);return false;}
}
async function saveToGitHub(){
  if(!_ghToken)return;
  /* Fetch SHA lazily on first save */
  if(!_fileSha){
    try{
      const sr=await fetch(API_URL,{headers:{Authorization:"Bearer "+_ghToken,Accept:"application/vnd.github+json"}});
      if(!sr.ok)throw new Error("SHA HTTP "+sr.status);
      _fileSha=(await sr.json()).sha;
    }catch(e){showSave("✗ No se pudo obtener SHA: "+e.message,false);return;}
  }
  const content=btoa(unescape(encodeURIComponent(JSON.stringify({projects:data},null,2))));
  try{
    showSave("Guardando…");
    const res=await fetch(API_URL,{method:"PUT",headers:{Authorization:"Bearer "+_ghToken,"Content-Type":"application/json",Accept:"application/vnd.github+json"},
      body:JSON.stringify({message:"DVS Portal update "+new Date().toISOString().slice(0,16).replace("T"," "),content,sha:_fileSha})});
    if(!res.ok)throw new Error((await res.json().catch(()=>({}))).message||"HTTP "+res.status);
    const j=await res.json();_fileSha=j.content.sha;showSave("✓ Guardado",true);
  }catch(e){showSave("✗ Error: "+e.message,false);console.error("save error:",e);}
}
function save(){if(!_ghToken)return;clearTimeout(_saveTimer);showSave("Guardando…");_saveTimer=setTimeout(saveToGitHub,1500);}

let data=[],role=null,clientIdx=null,activeTab=0,admSect="milestones",npMods=[];

function doLogin(){
  const pw=document.getElementById("login-pw").value.trim();
  document.getElementById("login-err").textContent="";
  if(pw===CONFIG.adminPassword){role="admin";clientIdx=null;activeTab=0;_ghToken=ADMIN_GH_TOKEN;launchApp();return;}
  for(let i=0;i<data.length;i++){if(pw===data[i].clientPassword){role="client";clientIdx=i;activeTab=i;launchApp();return;}}
  document.getElementById("login-err").textContent="Contraseña incorrecta.";
}
function launchApp(){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").style.display="block";

function fmtDate(s){
  if(!s)return"";const[y,m,d]=s.split("-");
  const mo=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return d+" "+mo[+m-1]+" "+y;
}
function tlPct(ds,ss,es){
  const d=new Date(ds),s=new Date(ss),e=new Date(es);
  if(e<=s)return 50;return Math.max(0,Math.min(100,((d-s)/(e-s))*100));
}
function msSt(ms){
  if(ms.done)return"done";
  const t=new Date().toISOString().slice(0,10);
  return ms.date<t?"late":"pend";
}
function ring(pct,color,size=84,sw=6){
  const r=(size-sw)/2,c=2*Math.PI*r,off=c-(pct/100)*c;
  return `<svg width="${size}" height="${size}" style="flex-shrink:0"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e8e7e0" stroke-width="${sw}"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .5s"/><text x="${size/2}" y="${size/2}" text-anchor="middle" dominant-baseline="central" style="fill:#18170f;font-size:16px;font-weight:600;font-family:'DM Sans',sans-serif">${pct}%</text></svg>`;
}

function renderTabs(){
  document.getElementById("tabs-row").innerHTML=data.map((p,i)=>{
    const pl=PAL[p.color||"teal"],on=i===activeTab;
    return `<button class="tab${on?" on":""}" style="${on?`border-color:${pl.main};background:${pl.sub};color:${pl.txt}`:""}" onclick="switchTab(${i})">${p.name}</button>`;
  }).join("");
}

function renderProject(){
  if(!data.length){
    document.getElementById("proj-view").innerHTML=`<div style="text-align:center;padding:60px 20px;color:var(--txt3)"><div style="font-size:32px;margin-bottom:12px">📂</div><div style="font-size:15px;font-weight:500;color:var(--txt2);margin-bottom:6px">No hay proyectos cargados</div><div style="font-size:13px">Los datos no pudieron cargarse desde GitHub. Revisa la consola del navegador (F12) para más detalles.</div></div>`;
    return;
  }
  const proj=data[activeTab];if(!proj)return;
  const pal=PAL[proj.color||"teal"];
  const ms=proj.milestones||[],mods=proj.modules||[];
  const total=mods.length?Math.round(mods.reduce((s,m)=>s+m.pct,0)/mods.length):0;
  const done=ms.filter(m=>m.done);
  const late=ms.filter(m=>msSt(m)==="late");
  const tpct=proj.startDate&&proj.endDate?tlPct(new Date().toISOString().slice(0,10),proj.startDate,proj.endDate):0;
  const lateByDvs=late.filter(m=>m.responsible==="dvs").length;
  const lateByClient=late.filter(m=>m.responsible==="client").length;
  let statusColor,statusTxt;
  if(!late.length){statusColor="#085041";statusTxt="En tiempo ✓";}
  else{
    statusColor="#A32D2D";
    const who=lateByDvs&&lateByClient?"DVS y Cliente":lateByDvs?"Dataverse Solutions":"Cliente";
    statusTxt="Retrasado · Responsable: "+who;
  }
  const doneMsList=ms.filter(m=>m.done);
  const pendMsList=ms.filter(m=>msSt(m)==="pend");
  const lateMsList=ms.filter(m=>msSt(m)==="late");

  function msHTML(m){
    const st=msSt(m),dvs=m.responsible==="dvs";
    const rc=dvs?pal:CLIENT_CLR;
    const rowC=st==="done"?"done-row":st==="late"?"late-row":"pend-row";
    const iconBg=st==="done"?pal.main:st==="late"?"#A32D2D":"#ccc9c0";
    const iconSvg=st==="done"?`<svg viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3 5.5L8 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:st==="late"?`<svg viewBox="0 0 9 9" fill="none"><path d="M4.5 1v3.5M4.5 7h.01" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>`:"";
    return `<div class="ms-item ${rowC}">
      <div class="ms-icon" style="background:${iconBg}">${iconSvg}</div>
      <div class="ms-body">
        <div class="ms-name">${m.title}</div>
        <div class="ms-sub">${st==="done"?"":"Target: "}${fmtDate(m.date)}${m.notes?" · "+m.notes:""}</div>
      </div>
      <div class="ms-resp" style="background:${rc.light};color:${rc.txt}">${dvs?"DVS":"Cliente"}</div>
    </div>`;
  }

  const dotHtml=ms.map(m=>{
    if(!proj.startDate||!proj.endDate)return"";
    const pct=tlPct(m.date,proj.startDate,proj.endDate);
    const st=msSt(m),dvs=m.responsible==="dvs";
    const color=st==="done"?pal.main:st==="late"?"#A32D2D":dvs?pal.main:CLIENT_CLR.main;
    const bg=st==="done"?color:"#fff";
    return `<div class="tl-dot-wrap" style="left:${pct}%;top:0" title="${m.title} — ${fmtDate(m.date)}">
      <div class="tl-dot" style="background:${bg};box-shadow:0 0 0 2.5px ${color}"></div>
      <div class="tl-dot-line"></div>
      <div class="tl-dot-lbl">${m.title}</div>
    </div>`;
  }).join("");

  const tpctC=Math.min(100,Math.max(0,tpct));
  const daysLeft=proj.endDate?Math.max(0,Math.round((new Date(proj.endDate)-new Date())/(86400000))):null;

  document.getElementById("proj-view").innerHTML=`
    <div class="proj-hdr">
      <h1>${proj.name}</h1>
      <p>${proj.desc||""}</p>
      <div class="proj-meta">
        <div class="meta-chip">📅 Inicio: ${fmtDate(proj.startDate||"")}</div>
        <div class="meta-chip">🏁 Entrega: ${fmtDate(proj.endDate||"")}</div>
        <div class="status-chip" style="background:${statusColor}18;color:${statusColor};border-color:${statusColor}40">${statusTxt}</div>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-lbl">Progreso módulos</div><div class="stat-val" style="color:${pal.main}">${total}%</div></div>
      <div class="stat"><div class="stat-lbl">Actividades completadas</div><div class="stat-val">${done.length} <span style="font-size:15px;font-weight:400;color:var(--txt3)">/ ${ms.length}</span></div></div>
      <div class="stat"><div class="stat-lbl">Actividades retrasadas</div><div class="stat-val" style="color:${late.length?"#A32D2D":"#085041"}">${late.length}</div></div>
      <div class="stat"><div class="stat-lbl">Días restantes</div><div class="stat-val">${daysLeft!==null?daysLeft:"—"}</div></div>
    </div>
    <div class="tl-card">
      <div class="tl-top">
        <div class="tl-label">Línea de tiempo</div>
        <div class="tl-legend">
          <div class="tl-legend-item"><div class="tl-legend-dot" style="background:${pal.main}"></div>Dataverse Solutions</div>
          <div class="tl-legend-item"><div class="tl-legend-dot" style="background:${CLIENT_CLR.main}"></div>Cliente</div>
          <div class="tl-legend-item"><div class="tl-legend-dot" style="background:#A32D2D"></div>Retrasado</div>
        </div>
      </div>
      <div class="tl-bar-wrap">
        <div class="tl-bar-bg">
          <div class="tl-bar-prog" style="width:${tpctC}%;background:${pal.main}"></div>
          <div class="tl-today-line" style="left:${tpctC}%;background:#18170f"><div class="tl-today-lbl">Hoy</div></div>
        </div>
        <div class="tl-dates"><span class="tl-date-lbl">${fmtDate(proj.startDate||"")}</span><span class="tl-date-lbl">${fmtDate(proj.endDate||"")}</span></div>
      </div>
      <div class="tl-dots-row">${dotHtml}</div>
    </div>
    <div class="ms-grid">
      <div class="ms-card">
        ${lateMsList.length?`<div class="ms-card-hdr" style="color:#A32D2D"><div class="ms-dot-sm" style="background:#A32D2D"></div>Retrasadas (${lateMsList.length})</div>${lateMsList.map(msHTML).join("")}`:""}
        ${doneMsList.length?`<div class="ms-card-hdr" style="color:${pal.main};margin-top:${lateMsList.length?14:0}px"><div class="ms-dot-sm" style="background:${pal.main}"></div>Completadas (${doneMsList.length})</div>${doneMsList.map(msHTML).join("")}`:""}
        ${!lateMsList.length&&!doneMsList.length?`<p style="font-size:13px;color:var(--txt3)">Sin actividades completadas.</p>`:""}
      </div>
      <div class="ms-card">
        <div class="ms-card-hdr" style="color:var(--txt3)"><div class="ms-dot-sm" style="background:var(--bdr2)"></div>Pendientes (${pendMsList.length})</div>
        ${pendMsList.length?pendMsList.map(msHTML).join(""):`<p style="font-size:13px;color:var(--txt3)">Sin actividades pendientes.</p>`}
      </div>
    </div>
    <div class="mod-card">
      <div class="mod-card-hdr">Módulos<div style="font-size:11px;font-weight:400;color:var(--txt3);text-transform:none;letter-spacing:0">Avance por área</div></div>
      <div class="ring-row">${ring(total,pal.main)}<div style="font-size:13px;color:var(--txt2)">Avance general del proyecto</div></div>
      ${mods.map(m=>`<div class="mod-row"><div class="mod-lbl"><span>${m.name}</span><span style="color:${pal.main};font-weight:600">${m.pct}%</span></div><div class="bar-bg"><div class="bar-fill" style="width:${m.pct}%;background:${pal.main}"></div></div></div>`).join("")}
    </div>`;
}

  const el=document.getElementById("adm-content");if(!el)return;
  if(admSect==="milestones"){
    el.innerHTML=(proj.milestones||[]).map(ms=>`
      <div class="adm-ms-card">

    <div class="add-section"><div class="add-lbl">Agregar actividad</div>

      <div class="adm-mod-card">

          <span class="pct-val" style="color:${pal.main}" id="av-${m.id}">${m.pct}%</span>
          <button class="btn-danger" onclick="delMod('${m.id}')">Eliminar</button>
        </div>
        <input type="range" min="0" max="100" value="${m.pct}" step="1" style="accent-color:${pal.main};width:100%;margin-top:4px" oninput="updMod('${m.id}',this.value)"/>
      </div>`).join("")+`
    <div class="add-section"><div class="add-lbl">Agregar módulo</div>
      <div class="adm-row">

        <input type="number" id="new-mod-pct" placeholder="%" min="0" max="100" value="0" style="width:70px"/>
        <button class="btn-add" onclick="addMod()">+ Agregar</button>
      </div>
    </div>`;
  }else{
    el.innerHTML=`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
        <div><label style="display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--txt3);margin-bottom:6px">Nombre</label><input type="text" value="${proj.name}" oninput="updProj('name',this.value)" style="width:100%"/></div>
        <div><label style="display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--txt3);margin-bottom:6px">Contraseña cliente</label><input type="text" value="${proj.clientPassword||""}" oninput="updProj('clientPassword',this.value)" style="width:100%"/></div>
      </div>
      <div style="margin-bottom:12px"><label style="display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--txt3);margin-bottom:6px">Descripción</label><input type="text" value="${proj.desc||""}" oninput="updProj('desc',this.value)" style="width:100%"/></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label style="display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--txt3);margin-bottom:6px">Fecha inicio (contrato)</label><input type="date" value="${proj.startDate||""}" onchange="updProj('startDate',this.value)" style="width:100%"/></div>
        <div><label style="display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--txt3);margin-bottom:6px">Fecha entrega</label><input type="date" value="${proj.endDate||""}" onchange="updProj('endDate',this.value)" style="width:100%"/></div>
      </div>`;
  }
}

function switchTab(i){activeTab=i;renderTabs();renderProject();renderAdminPanel();}
function updProj(f,v){data[activeTab][f]=v;if(f==="clientPassword"){const ci=CONFIG.projects.findIndex(x=>x.id===data[activeTab].id);if(ci>=0)CONFIG.projects[ci].clientPassword=v;}save();renderProject();if(role==="admin")renderAdminPanel();}
function togMs(id){data[activeTab].milestones.find(x=>x.id===id).done^=1;save();renderProject();renderAdmContent();}
function updMs(id,f,v){data[activeTab].milestones.find(x=>x.id===id)[f]=v;save();renderProject();}
function addMs(){
  const title=document.getElementById("new-ms-title")?.value.trim();
  const date=document.getElementById("new-ms-date")?.value;
  const resp=document.getElementById("new-ms-resp")?.value||"dvs";
  if(!title)return;
  data[activeTab].milestones.push({id:"ms"+Date.now(),title,date:date||new Date().toISOString().slice(0,10),done:false,notes:"",responsible:resp});
  save();renderAdmContent();renderProject();
}
function delMs(id){data[activeTab].milestones=data[activeTab].milestones.filter(m=>m.id!==id);save();renderAdmContent();renderProject();}
function updMod(id,val){data[activeTab].modules.find(x=>x.id===id).pct=+val;const el=document.getElementById("av-"+id);if(el)el.textContent=val+"%";save();renderProject();}
function updModName(id,val){data[activeTab].modules.find(x=>x.id===id).name=val;save();renderProject();}
function addMod(){
  const n=document.getElementById("new-mod-name")?.value.trim();
  const p=Math.min(100,Math.max(0,+(document.getElementById("new-mod-pct")?.value||0)));
  if(!n)return;data[activeTab].modules.push({id:"m"+Date.now(),name:n,pct:p});save();renderAdmContent();renderProject();
}
function delMod(id){if(data[activeTab].modules.length<=1)return;data[activeTab].modules=data[activeTab].modules.filter(m=>m.id!==id);save();renderAdmContent();renderProject();}
function openNp(){
  npMods=[];["np-name","np-desc","np-pw","np-mod-inp"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
  ["np-start","np-end"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
  document.getElementById("np-err").style.display="none";
  renderNpMods();
  const pal=PAL[data[activeTab]?.color||"teal"];
  document.getElementById("np-save-btn").style.background=pal.main;
  document.getElementById("modal-np").style.display="flex";
  setTimeout(()=>document.getElementById("np-name").focus(),60);
}
function closeNp(){document.getElementById("modal-np").style.display="none";}
function renderNpMods(){document.getElementById("np-mods-list").innerHTML=npMods.map((m,i)=>`<div class="np-mod-row"><span>${m.name}</span><button onclick="npDelMod(${i})">×</button></div>`).join("");}
function npAddMod(){const inp=document.getElementById("np-mod-inp");const n=inp.value.trim();if(!n)return;npMods.push({id:"m"+Date.now(),name:n,pct:0});inp.value="";renderNpMods();inp.focus();}
function npDelMod(i){npMods.splice(i,1);renderNpMods();}
function saveNewProject(){
  const name=document.getElementById("np-name").value.trim();
  const desc=document.getElementById("np-desc").value.trim();
  const pw=document.getElementById("np-pw").value.trim();
  const color=document.getElementById("np-color").value;
  const start=document.getElementById("np-start").value;
  const end=document.getElementById("np-end").value;
  const errEl=document.getElementById("np-err");errEl.style.display="none";
  if(!name){errEl.textContent="El nombre es obligatorio.";errEl.style.display="block";return;}
  if(!pw){errEl.textContent="La contraseña del cliente es obligatoria.";errEl.style.display="block";return;}
  if(!start||!end){errEl.textContent="Las fechas de inicio y entrega son obligatorias.";errEl.style.display="block";return;}
  if(pw===CONFIG.adminPassword){errEl.textContent="La contraseña no puede ser la del admin.";errEl.style.display="block";return;}
  if(data.some(p=>p.clientPassword===pw)){errEl.textContent="Esa contraseña ya existe.";errEl.style.display="block";return;}
  const np={id:"proj"+Date.now(),name,desc:desc||name,color,clientPassword:pw,startDate:start,endDate:end,
    modules:npMods.length?npMods:[{id:"m1",name:"Módulo principal",pct:0}],
    milestones:[{id:"ms1",title:"Firma de contrato",date:start,done:true,notes:"",responsible:"dvs"}]};
  data.push(np);CONFIG.projects.push({id:np.id,name:np.name,clientPassword:pw});

(function(){
  const img=new Image();
  img.onload=function(){
    const c=document.createElement("canvas");c.width=img.width;c.height=img.height;
    const ctx=c.getContext("2d");ctx.drawImage(img,0,0);
    const d=ctx.getImageData(0,0,c.width,c.height),px=d.data;
    for(let i=0;i<px.length;i+=4){const b=(px[i]+px[i+1]+px[i+2])/3;if(b<40)px[i+3]=0;else if(b<80)px[i+3]=Math.round(((b-40)/40)*255);}
    ctx.putImageData(d,0,0);const url=c.toDataURL();
    ["login-logo","hdr-logo"].forEach(id=>{const el=document.getElementById(id);if(el)el.src=url;});
  };img.src=LOGO_B64;
})();

(async()=>{

  document.getElementById("login-screen").style.display="flex";
  setTimeout(()=>document.getElementById("login-pw").focus(),80);
})();
